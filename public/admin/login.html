<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 家庭衣橱管理</title>
  <link rel="stylesheet" href="/public/shared/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">👕</div>
    <h1 class="login-title">家庭衣橱</h1>
    <p class="login-subtitle">请输入管理员密码</p>

    <!-- 表单：垂直堆叠，间距 24px -->
    <div class="form-group" style="width:100%">
      <label class="form-label">密码</label>
      <input type="password" class="form-control" id="password-input"
        placeholder="请输入密码" autocomplete="current-password">
    </div>

    <div id="error-msg" style="color:var(--danger);font-size:0.88rem;margin-top:-12px;margin-bottom:8px;width:100%;display:none">
      密码错误，请重试
    </div>

    <!-- 登录按钮：100% 宽度 -->
    <button class="btn btn-primary btn-lg" id="login-btn" style="width:100%;justify-content:center">
      登录
    </button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/public/shared/utils.js"></script>
<script>
  const U = window.WardrobeUtils;
  const LS_KEY = 'wardrobe_admin_logged_in';

  async function doLogin() {
    const pwd = document.getElementById('password-input').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');
    if (!pwd) return;
    btn.disabled = true; btn.textContent = '登录中…';
    err.style.display = 'none';
    try {
      await U.apiFetch('/api/login', { method: 'POST', body: JSON.stringify({ password: pwd }) });
      localStorage.setItem(LS_KEY, '1');
      window.location.href = '/admin';
    } catch {
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = '登录';
      document.getElementById('password-input').focus();
    }
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
