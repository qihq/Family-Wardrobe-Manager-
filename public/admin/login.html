<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 · 家庭衣橱</title>
  <link rel="stylesheet" href="/public/shared/style.css">
  <style>
    .login-error {
      color: var(--danger);
      font-size: 0.88rem;
      margin-top: 6px;
      min-height: 20px;
    }
    .login-logo { font-size: 2.8rem; text-align: center; margin-bottom: 4px; }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">👕</div>
    <div class="login-title">家庭衣橱管理</div>
    <div class="login-subtitle">管理员登录</div>

    <div class="form-group">
      <label class="form-label" for="password">登录密码</label>
      <input
        type="password"
        id="password"
        class="form-control"
        placeholder="请输入管理密码"
        autocomplete="current-password"
        autofocus
      >
      <div class="login-error" id="login-error"></div>
    </div>

    <button class="btn btn-primary btn-lg" id="login-btn" style="width:100%">
      登录
    </button>

    <div style="margin-top:20px; text-align:center">
      <a href="/view" style="font-size:0.88rem; color:var(--text-secondary)">
        → 前往只读展示端
      </a>
    </div>
  </div>

  <script>
    const pwdInput  = document.getElementById('password');
    const loginBtn  = document.getElementById('login-btn');
    const errorDiv  = document.getElementById('login-error');

    async function doLogin() {
      const password = pwdInput.value.trim();
      if (!password) { errorDiv.textContent = '请输入密码'; return; }

      loginBtn.disabled = true;
      loginBtn.textContent = '登录中…';
      errorDiv.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin';
        } else {
          errorDiv.textContent = data.message || '密码错误';
          pwdInput.select();
        }
      } catch {
        errorDiv.textContent = '网络错误，请重试';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
